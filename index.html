<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGE — 현자의 예언서</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c8a44d;
    --gold-light: #f2df9b;
    --gold-mid: #e0c06f;
    --gold-deep: #8a6930;
    --gold-dim: #6b5326;
    --deep: #070509;
    --deep-soft: #0d0910;
    --mist: rgba(242,223,155,0.06);
    --mist-strong: rgba(242,223,155,0.12);
  }

  body {
    background:
      radial-gradient(circle at 50% 18%, rgba(242,223,155,0.08), transparent 32%),
      radial-gradient(circle at 50% 55%, rgba(200,164,77,0.04), transparent 42%),
      linear-gradient(180deg, #050408 0%, #09060b 40%, #070509 100%);
    color: var(--gold);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container::before {
    content: '';
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    width: 420px;
    height: 420px;
    background: radial-gradient(circle, rgba(242,223,155,0.05), transparent 62%);
    filter: blur(18px);
    pointer-events: none;
    z-index: 0;
  }

  .top-ornament {
    text-align: center;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeIn 2s ease forwards 0.4s;
  }

  .top-ornament svg {
    width: 220px;
    height: 42px;
  }

  .title-wrap {
    text-align: center;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeIn 2s ease forwards 0.9s;
  }

  .title-sage {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(52px, 12vw, 84px);
    font-weight: 700;
    letter-spacing: 0.24em;
    line-height: 1;
    margin-left: 0.24em;
    background: linear-gradient(
      180deg,
      #fff7cc 0%,
      #f2df9b 18%,
      #e0c06f 45%,
      #c8a44d 68%,
      #8a6930 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 0 8px rgba(242,223,155,0.18),
      0 0 18px rgba(200,164,77,0.14),
      0 0 36px rgba(200,164,77,0.08);
  }

  .title-sub {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    letter-spacing: 0.42em;
    color: #9d7a38;
    margin-top: 8px;
  }

  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0 26px;
    opacity: 0;
    animation: fadeIn 2s ease forwards 1.3s;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(224,192,111,0.45), transparent);
  }

  .divider-gem {
    width: 10px;
    height: 10px;
    background: linear-gradient(180deg, #fff2b8 0%, #c8a44d 100%);
    transform: rotate(45deg);
    box-shadow:
      0 0 8px rgba(242,223,155,0.25),
      0 0 16px rgba(200,164,77,0.18);
  }

  .invite-text {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(14px, 3.5vw, 17px);
    color: rgba(242,223,155,0.72);
    line-height: 2.1;
    letter-spacing: 0.04em;
    margin-bottom: 34px;
    opacity: 0;
    animation: fadeIn 2s ease forwards 1.8s;
  }

  .invite-text em {
    color: var(--gold-light);
    font-style: italic;
  }

  .sages-label {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 10px;
    letter-spacing: 0.34em;
    color: #8f6d32;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.1s;
  }

  .sages-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.3s;
  }

  .sage-chip {
    padding: 7px 15px;
    border: 1px solid rgba(138,105,48,0.75);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: #9f7d3b;
    cursor: pointer;
    transition: all 0.28s ease;
    letter-spacing: 0.04em;
    background:
      linear-gradient(180deg, rgba(255,247,204,0.02), rgba(200,164,77,0.02));
    box-shadow: inset 0 0 0 1px rgba(242,223,155,0.03);
  }

  .sage-chip:hover,
  .sage-chip.active {
    border-color: #d7b866;
    color: #f0da96;
    background:
      linear-gradient(180deg, rgba(242,223,155,0.06), rgba(200,164,77,0.05));
    box-shadow:
      0 0 10px rgba(242,223,155,0.08),
      0 0 18px rgba(200,164,77,0.08),
      inset 0 0 0 1px rgba(242,223,155,0.05);
  }

  .input-wrap {
    width: 100%;
    position: relative;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.6s;
  }

  .input-border {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(138,105,48,0.78);
    pointer-events: none;
    transition: all 0.3s;
    box-shadow: inset 0 0 18px rgba(242,223,155,0.02);
  }

  .input-border::before {
    content: '';
    position: absolute;
    top: -1px;
    left: -1px;
    width: 12px;
    height: 12px;
    border-top: 2px solid #d7b866;
    border-left: 2px solid #d7b866;
  }

  .input-border::after {
    content: '';
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 12px;
    height: 12px;
    border-bottom: 2px solid #d7b866;
    border-right: 2px solid #d7b866;
  }

  textarea {
    width: 100%;
    background: rgba(8,6,10,0.82);
    border: none;
    outline: none;
    color: rgba(242,223,155,0.88);
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(14px, 3.6vw, 16px);
    line-height: 1.9;
    padding: 22px;
    resize: none;
    height: 140px;
    letter-spacing: 0.02em;
  }

  textarea::placeholder {
    color: rgba(242,223,155,0.22);
    font-style: italic;
  }

  .input-hint {
    width: 100%;
    text-align: right;
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: rgba(242,223,155,0.44);
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.8s;
  }

  .ask-btn, .again-btn {
    width: 100%;
    padding: 16px;
    background:
      linear-gradient(180deg, rgba(255,247,204,0.02), rgba(200,164,77,0.03));
    border: 1px solid #b99549;
    color: #e9d28c;
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(12px, 3vw, 14px);
    letter-spacing: 0.28em;
    cursor: pointer;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 1s ease forwards 3s;
  }

  .again-btn {
    margin-top: 18px;
    font-size: 12px;
    padding: 14px;
    animation: none;
    opacity: 1;
  }

  .ask-btn::before, .again-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(242,223,155,0.10);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.6s ease, height 0.6s ease;
  }

  .ask-btn:hover::before,
  .again-btn:hover::before {
    width: 420px;
    height: 420px;
  }

  .ask-btn:hover,
  .again-btn:hover {
    box-shadow:
      0 0 12px rgba(242,223,155,0.08),
      0 0 28px rgba(200,164,77,0.12);
    border-color: #dcbc68;
    color: #fff0b8;
  }

  .ask-btn:disabled,
  .again-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .loading-wrap {
    text-align: center;
    padding: 42px 0 8px;
    display: none;
  }

  .loading-wrap.visible {
    display: block;
  }

  .loading-rune {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 34px;
    color: var(--gold-light);
    animation: spin 3s linear infinite;
    display: inline-block;
    text-shadow:
      0 0 10px rgba(242,223,155,0.22),
      0 0 22px rgba(200,164,77,0.16);
  }

  .loading-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    letter-spacing: 0.22em;
    color: #9a7738;
    margin-top: 14px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .response-wrap {
    width: 100%;
    margin-top: 42px;
    display: none;
  }

  .response-wrap.visible {
    display: block;
  }

  .response-ornament {
    text-align: center;
    margin-bottom: 24px;
  }

  .response-ornament span {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: #8f6d32;
  }

  .prophecy-box {
    position: relative;
    padding: 34px 30px;
    background:
      radial-gradient(circle at 50% 18%, rgba(242,223,155,0.03), transparent 35%),
      linear-gradient(180deg, rgba(10,7,11,0.94), rgba(8,6,10,0.92));
    border: 1px solid rgba(138,105,48,0.78);
    box-shadow:
      0 0 30px rgba(0,0,0,0.28),
      inset 0 0 40px rgba(242,223,155,0.015);
  }

  .prophecy-box::before {
    content: '';
    position: absolute;
    top: 4px;
    left: 4px;
    right: 4px;
    bottom: 4px;
    border: 1px solid rgba(242,223,155,0.10);
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
  }

  .corner-tl {
    top: -1px;
    left: -1px;
    border-top: 2px solid #d7b866;
    border-left: 2px solid #d7b866;
  }

  .corner-tr {
    top: -1px;
    right: -1px;
    border-top: 2px solid #d7b866;
    border-right: 2px solid #d7b866;
  }

  .corner-bl {
    bottom: -1px;
    left: -1px;
    border-bottom: 2px solid #d7b866;
    border-left: 2px solid #d7b866;
  }

  .corner-br {
    bottom: -1px;
    right: -1px;
    border-bottom: 2px solid #d7b866;
    border-right: 2px solid #d7b866;
  }

  .sage-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: #987535;
    margin-bottom: 22px;
    text-align: center;
    line-height: 1.8;
  }

  .prophecy-text {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(18px, 4.8vw, 24px);
    line-height: 2.05;
    color: #f1dda0;
    text-align: center;
    letter-spacing: 0.06em;
    text-shadow:
      0 0 8px rgba(242,223,155,0.10),
      0 0 22px rgba(200,164,77,0.10);
    min-height: 60px;
  }

  .prophecy-text .char,
  .interpretation-text .char {
    display: inline;
    opacity: 0;
    animation: charAppear 0.08s ease forwards;
  }

  .interpretation-wrap {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid rgba(242,223,155,0.10);
  }

  .interpretation-label {
    text-align: center;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #8f6d32;
    margin-bottom: 12px;
  }

  .interpretation-text {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(14px, 3.6vw, 16px);
    line-height: 1.9;
    color: rgba(242,223,155,0.76);
    text-align: center;
    letter-spacing: 0.02em;
    min-height: 24px;
  }

  .wisdom-source {
    margin-top: 22px;
    text-align: center;
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 14px;
    color: #8b6c33;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .wisdom-source.visible {
    opacity: 1;
  }

  .bottom-ornament {
    margin-top: 52px;
    text-align: center;
    opacity: 0.34;
  }

  .bottom-ornament span {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 9px;
    letter-spacing: 0.42em;
    color: #83652f;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes charAppear {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  @media (max-width: 640px) {
    .container {
      padding: 34px 16px 70px;
    }

    .title-sage {
      letter-spacing: 0.18em;
      margin-left: 0.18em;
    }

    .sages-row {
      gap: 8px;
    }

    .sage-chip {
      font-size: 11px;
      padding: 7px 13px;
    }

    .prophecy-box {
      padding: 28px 20px;
    }

    textarea {
      height: 132px;
      padding: 18px;
    }

    .container::before {
      width: 320px;
      height: 320px;
      top: 120px;
    }
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="container">
  <div class="top-ornament">
    <svg viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="20" x2="80" y2="20" stroke="#7a5f28" stroke-width="0.5"/>
      <polygon points="100,4 108,20 100,36 92,20" stroke="#d7b866" stroke-width="1" fill="none"/>
      <polygon points="100,10 105,20 100,30 95,20" fill="#e0c06f" opacity="0.45"/>
      <line x1="120" y1="20" x2="200" y2="20" stroke="#7a5f28" stroke-width="0.5"/>
      <circle cx="40" cy="20" r="2" fill="#7a5f28"/>
      <circle cx="160" cy="20" r="2" fill="#7a5f28"/>
    </svg>
  </div>

  <div class="title-wrap">
    <div class="title-sage">SAGE</div>
    <div class="title-sub">현자의 예언서</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-gem"></div>
    <div class="divider-line"></div>
  </div>

  <div class="invite-text">
    시대를 초월한 지혜가 이곳에 깃들어 있다<br>
    <em>그대의 번민을 고하라 — 현자가 길을 보여주리니</em>
  </div>

  <div class="sages-label">CHOOSE YOUR SAGE</div>
  <div class="sages-row" id="sagesRow">
    <div class="sage-chip active" data-sage="all">모든 현자</div>
    <div class="sage-chip" data-sage="socrates">소크라테스</div>
    <div class="sage-chip" data-sage="jungYakYong">정약용</div>
    <div class="sage-chip" data-sage="nietzsche">니체</div>
    <div class="sage-chip" data-sage="laozi">노자</div>
    <div class="sage-chip" data-sage="marcus">마르쿠스 아우렐리우스</div>
    <div class="sage-chip" data-sage="buddha">부처</div>
    <div class="sage-chip" data-sage="schopenhauer">쇼펜하우어</div>
    <div class="sage-chip" data-sage="seneca">세네카</div>
    <div class="sage-chip" data-sage="beopjeong">법정 스님</div>
    <div class="sage-chip" data-sage="kimSouHwan">김수환 추기경</div>
    <div class="sage-chip" data-sage="helenKeller">헬렌 켈러</div>
    <div class="sage-chip" data-sage="yiSunSin">이순신</div>
    <div class="sage-chip" data-sage="sejong">세종대왕</div>
    <div class="sage-chip" data-sage="yuGwanSun">유관순</div>
    <div class="sage-chip" data-sage="chaeSaJang">채사장</div>
  </div>

  <div class="input-wrap">
    <textarea id="userInput" placeholder="그대의 고민을 털어놓으라...&#10;인생, 관계, 일, 미래 — 무엇이든 괜찮다"></textarea>
    <div class="input-border"></div>
  </div>

  <div class="input-hint">너무 짧기보다 조금 구체적일수록 더 선명한 답을 얻을 수 있다</div>

  <button class="ask-btn" id="askBtn">✦ 현자에게 묻다 ✦</button>

  <div class="loading-wrap" id="loadingWrap">
    <div class="loading-rune">✦</div>
    <div class="loading-text">현자들이 그대의 말을 헤아리는 중</div>
  </div>

  <div class="response-wrap" id="responseWrap">
    <div class="response-ornament"><span>— THE PROPHECY —</span></div>
    <div class="prophecy-box">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="sage-name" id="sageName"></div>
      <div class="prophecy-text" id="prophecyText"></div>

      <div class="interpretation-wrap">
        <div class="interpretation-label">— A SIMPLE INTERPRETATION —</div>
        <div class="interpretation-text" id="interpretationText"></div>
      </div>

      <div class="wisdom-source" id="wisdomSource"></div>
    </div>

    <button class="again-btn" id="againBtn">✦ 다른 해답 구하기 ✦</button>
  </div>

  <div class="bottom-ornament"><span>✦ SAGE ✦ 지혜는 시간을 초월한다 ✦</span></div>
</div>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.5 + 0.5,
    speedY: -(Math.random() * 0.3 + 0.1),
    speedX: (Math.random() - 0.5) * 0.2,
    opacity: Math.random() * 0.5,
    life: Math.random()
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.life += 0.003;
    if (p.life > 1) {
      p.life = 0;
      p.x = Math.random() * canvas.width;
      p.y = canvas.height + 10;
    }
    p.x += p.speedX;
    p.y += p.speedY;
    const alpha = p.life < 0.2 ? p.life * 5 * p.opacity : p.life > 0.8 ? (1 - p.life) * 5 * p.opacity : p.opacity;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(224,192,111,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

let selectedSage = 'all';

document.querySelectorAll('.sage-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.sage-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedSage = chip.dataset.sage;
  });
});

const sageNames = {
  all: '모든 현자들의 목소리',
  socrates: '소크라테스 (Σωκράτης)',
  jungYakYong: '정약용 (丁若鏞)',
  nietzsche: '프리드리히 니체 (Nietzsche)',
  laozi: '노자 (老子)',
  marcus: '마르쿠스 아우렐리우스',
  buddha: '부처',
  schopenhauer: '쇼펜하우어',
  seneca: '세네카',
  beopjeong: '법정 스님',
  kimSouHwan: '김수환 추기경',
  helenKeller: '헬렌 켈러',
  yiSunSin: '이순신',
  sejong: '세종대왕',
  yuGwanSun: '유관순',
  chaeSaJang: '채사장'
};

function typeText(element, text, speed = 80) {
  element.innerHTML = '';
  const chars = [...text];
  chars.forEach((char, i) => {
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = char;
    span.style.animationDelay = `${i * speed}ms`;
    element.appendChild(span);
  });
  return chars.length * speed;
}

function parseWisdom(raw) {
  if (!raw || typeof raw !== 'string') {
    return {
      prophecy: '현자들의 목소리가 아직 또렷하게 모이지 않았다.',
      interpretation: '잠시 후 다시 물으면 더 선명한 뜻이 드러날 것이다.'
    };
  }

  const separators = ['###해석###', '[해석]', '한 줄 해석:', '한줄 해석:', '해석:'];

  for (const sep of separators) {
    if (raw.includes(sep)) {
      const [prophecy, ...rest] = raw.split(sep);
      return {
        prophecy: prophecy.trim(),
        interpretation: rest.join(sep).trim() || '쉽게 말하면, 지금은 마음을 너무 몰아붙이지 말고 가장 중요한 한 가지부터 붙잡으라는 뜻이다.'
      };
    }
  }

  return {
    prophecy: raw.trim(),
    interpretation: '쉽게 말하면, 지금 필요한 것은 조급함보다 정리된 마음과 한 걸음의 실천이다.'
  };
}

async function askSage() {
  const input = document.getElementById('userInput').value.trim();
  if (!input) return;

  const btn = document.getElementById('askBtn');
  const loadingWrap = document.getElementById('loadingWrap');
  const responseWrap = document.getElementById('responseWrap');
  const wisdomSource = document.getElementById('wisdomSource');

  btn.disabled = true;
  responseWrap.classList.remove('visible');
  loadingWrap.classList.add('visible');

  try {
    const response = await fetch('/api/sage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: input,
        sagePersona: `${sagePersonas[selectedSage]} 반드시 한국어로 답하고, 먼저 예언서처럼 3~5문장으로 답한 뒤 "###해석###" 아래에 쉬운 말로 1~2문장 해석을 붙인다. 강압적이거나 훈계조가 아니라 품위 있고 자연스럽게 말한다.`
      })
    });

    const data = await response.json();
    const parsed = parseWisdom(data.wisdom);

    loadingWrap.classList.remove('visible');

    document.getElementById('sageName').textContent = sageNames[selectedSage];
    document.getElementById('prophecyText').innerHTML = '';
    document.getElementById('interpretationText').innerHTML = '';

    wisdomSource.textContent = `— ${sageDescriptions[selectedSage]} —`;
    wisdomSource.classList.remove('visible');

    responseWrap.classList.add('visible');

    const prophecyDuration = typeText(document.getElementById('prophecyText'), parsed.prophecy, 70);

    setTimeout(() => {
      typeText(document.getElementById('interpretationText'), parsed.interpretation, 28);
    }, prophecyDuration + 220);

    setTimeout(() => {
      wisdomSource.classList.add('visible');
    }, prophecyDuration + 700);

  } catch (err) {
    loadingWrap.classList.remove('visible');
    document.getElementById('sageName').textContent = '오류';
    document.getElementById('prophecyText').textContent = '현자들이 잠시 침묵하고 있습니다. 다시 시도하라.';
    document.getElementById('interpretationText').textContent = '잠시 후 다시 묻는 편이 좋겠다.';
    responseWrap.classList.add('visible');
  }

  btn.disabled = false;
}

document.getElementById('askBtn').addEventListener('click', askSage);
document.getElementById('againBtn').addEventListener('click', () => {
  document.getElementById('responseWrap').classList.remove('visible');
  document.getElementById('userInput').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
document.getElementById('userInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) askSage();
});
